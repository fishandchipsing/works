# Netlify config — static site, no build step.
# The site root is the publish directory itself.

[build]
  publish = "."

# Long cache for fingerprinted-ish static assets (fonts, images).
# blocks.json kept short so paragraph edits go live fast.
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/blocks.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Pretty-URL redirects so /archive/oio works without trailing index.html
[[redirects]]
  from = "/work"
  to = "/archive/"
  status = 301
